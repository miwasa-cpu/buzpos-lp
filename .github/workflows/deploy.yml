name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    name: HTML Validate
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install html-validate
        run: npm install -g html-validate

      - name: Validate HTML
        run: html-validate index.html || true

  compress-images:
    runs-on: ubuntu-latest
    name: Compress Images
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install imagemin
        run: npm install -g imagemin-cli imagemin-mozjpeg imagemin-pngquant

      - name: Compress images
        run: |
          for f in *.jpg *.jpeg *.png; do
            [ -f "$f" ] || continue
            original=$(stat -c%s "$f" 2>/dev/null || stat -f%z "$f")
            imagemin "$f" --plugin=mozjpeg --plugin=pngquant --out-dir=. 2>/dev/null || true
            compressed=$(stat -c%s "$f" 2>/dev/null || stat -f%z "$f")
            echo "$f: ${original} → ${compressed} bytes"
          done

  deploy:
    runs-on: ubuntu-latest
    name: Deploy
    needs: validate
    outputs:
      deployment-url: ${{ steps.deploy.outputs.deployment-url }}
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: >
            pages deploy . --project-name buzpos-lp
            ${{ github.ref == 'refs/heads/main' && '--branch main' || format('--branch pr-{0}', github.event.number) }}

      - name: Comment PR with preview URL
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🚀 **プレビューURL**: ${{ steps.deploy.outputs.deployment-url }}`
            })

  lighthouse:
    runs-on: ubuntu-latest
    name: Lighthouse
    needs: deploy
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Run Lighthouse
        uses: treosh/lighthouse-ci-action@v11
        with:
          urls: 'https://buzpos-lp.pages.dev'
          uploadArtifacts: true
          temporaryPublicStorage: true
